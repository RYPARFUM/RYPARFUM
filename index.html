<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RY PARFUM | Catálogo Completo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dorado: #c5a059; --amarillo: #f1c40f; --verde: #2ecc71; --negro: #000000; --gris: #111; --blanco: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--negro); color: var(--blanco); }

        nav { background: rgba(0,0,0,0.98); padding: 15px; text-align: center; border-bottom: 1px solid var(--dorado); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Cinzel', serif; font-size: 1.4rem; letter-spacing: 4px; color: var(--dorado); font-weight: 700; }

        .search-box { padding: 20px 15px; background: #080808; position: sticky; top: 60px; z-index: 999; }
        #buscador { width: 100%; padding: 14px 20px; border-radius: 30px; border: 1px solid var(--dorado); background: #1a1a1a; color: white; font-size: 16px; outline: none; }

        .container { width: 100%; padding: 0 15px 50px; }
        .section-header { border-left: 4px solid var(--dorado); padding-left: 10px; margin: 30px 0 15px; }
        .section-header h2 { font-family: 'Cinzel', serif; color: var(--dorado); font-size: 1.1rem; text-transform: uppercase; }

        .accordion { margin-bottom: 10px; border: 1px solid #222; border-radius: 8px; overflow: hidden; background: var(--gris); }
        .acc-header { padding: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; background: #111; }
        .acc-content { display: none; padding: 15px; grid-template-columns: 1fr; gap: 15px; background: #000; }
        @media(min-width: 600px) { .acc-content { grid-template-columns: 1fr 1fr; } }

        .card { background: #080808; border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #1a1a1a; position: relative; }
        .img-container { width: 100%; height: 180px; background: #fff; border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .card img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card h3 { font-size: 0.85rem; margin-bottom: 8px; min-height: 35px; color: #eee; }
        
        .p-trans { font-size: 0.75rem; color: var(--amarillo); font-weight: 600; }
        .p-cash { display: block; font-size: 1.25rem; color: var(--verde); font-weight: 800; margin-top: 4px; }
        .btn-wa { display: block; margin-top: 12px; background: var(--blanco); color: #000; text-decoration: none; padding: 12px; font-size: 0.75rem; font-weight: 800; border-radius: 5px; text-transform: uppercase; }

        .ig-float { position: fixed; bottom: 20px; right: 20px; background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1001; text-decoration: none; }
        footer { padding: 40px 20px; text-align: center; color: #444; font-size: 0.75rem; border-top: 1px solid #111; }
        .ig-link { color: var(--dorado); text-decoration: none; font-weight: 700; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<nav><div class="logo">RY PARFUM</div></nav>

<div class="search-box">
    <input type="text" id="buscador" placeholder="Buscar perfume o marca..." onkeyup="filtrar()">
</div>

<div class="container">
    <div class="section-header"><h2>Fragancias Árabes</h2></div>
    <div id="lista-arabes"></div>

    <div class="section-header"><h2>Línea Diseñador</h2></div>
    <div id="lista-disenador"></div>
</div>

<a href="https://www.instagram.com/TU_IG_AQUI" class="ig-float" target="_blank"><i class="fab fa-instagram"></i></a>

<footer>
    <a href="https://www.instagram.com/TU_IG_AQUI" class="ig-link">@TU_IG_AQUI</a><br>
    MARCOS DEL BUENO 636, MORENO | RY PARFUM © 2026
</footer>

<script>
    // --- LISTA DE PERFUMES ---
    // m = MARCA, n = NOMBRE, l = LISTA (Transf), e = EFECTIVO, t = TIPO (A: Árabe, D: Diseñador)
    const perfumes = [
        // ÁRABES
        { t:"A", m: "LATTAFA", n: "Khamrah", l: "59.670", e: "53.703" },
        { t:"A", m: "LATTAFA", n: "Asad", l: "64.260", e: "57.834" },
        { t:"A", m: "LATTAFA", n: "Yara Pink", l: "61.965", e: "55.769" },
        { t:"A", m: "ARMAF", n: "Club De Nuit Intense", l: "75.735", e: "68.162" },
        { t:"A", m: "RASASI", n: "Hawas For Him", l: "68.850", e: "61.965" },
        { t:"A", m: "FRENCH AVENUE", n: "Vulcan Feu", l: "100.980", e: "90.882" },
        { t:"A", m: "AFNAN", n: "9PM Night Out", l: "119.340", e: "107.406" },
        { t:"A", m: "AL HARAMAIN", n: "Amber Oud Gold", l: "95.000", e: "85.500" },

        // DISEÑADOR (Agrega todas las que quieras, se separan solas)
        { t:"D", m: "DIOR", n: "Sauvage Parfum", l: "319.500", e: "287.550" },
        { t:"D", m: "JPG", n: "Le Male Elixir", l: "238.500", e: "214.650" },
        { t:"D", m: "GIORGIO ARMANI", n: "Acqua Di Gio Profondo", l: "185.000", e: "166.500" },
        { t:"D", m: "CAROLINA HERRERA", n: "Bad Boy Extreme", l: "195.000", e: "175.500" },
        { t:"D", m: "VERSACE", n: "Eros Flame", l: "140.000", e: "126.000" }
    ];

    function generarCatalogo() {
        const contArabes = document.getElementById('lista-arabes');
        const contDisenador = document.getElementById('lista-disenador');

        // Obtener marcas únicas por tipo
        const marcasA = [...new Set(perfumes.filter(p=>p.t==="A").map(p=>p.m))].sort();
        const marcasD = [...new Set(perfumes.filter(p=>p.t==="D").map(p=>p.m))].sort();

        const renderGrupo = (marcas, contenedor) => {
            marcas.forEach(marca => {
                const lista = perfumes.filter(p => p.m === marca);
                const acc = document.createElement('div');
                acc.className = 'accordion';
                acc.innerHTML = `
                    <div class="acc-header" onclick="toggleAcc(this)">
                        ${marca} <span>(${lista.length})</span> <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="acc-content">
                        ${lista.map(p => `
                            <div class="card" data-search="${p.n} ${p.m}">
                                <div class="img-container">
                                    <img src="FOTOS/${p.n.replace(/\s+/g, '_').toLowerCase()}.jpg" onerror="this.src='https://via.placeholder.com/200?text=RY+PARFUM'">
                                </div>
                                <h3>${p.n}</h3>
                                <div class="price-box">
                                    <span class="p-trans">TRANSF: $${p.l}</span>
                                    <span class="p-cash">$${p.e} <small>EFECTIVO</small></span>
                                </div>
                                <a href="https://wa.me/5491163605504?text=Hola! Quiero consultar por ${p.n}" class="btn-wa">Consultar</a>
                            </div>
                        `).join('')}
                    </div>`;
                contenedor.appendChild(acc);
            });
        };

        renderGrupo(marcasA, contArabes);
        renderGrupo(marcasD, contDisenador);
    }

    function toggleAcc(el, forceOpen = false) {
        const content = el.nextElementSibling;
        const icon = el.querySelector('i');
        const isOpen = content.style.display === "grid";
        content.style.display = (isOpen && !forceOpen) ? "none" : "grid";
        icon.className = (isOpen && !forceOpen) ? "fas fa-chevron-down" : "fas fa-chevron-up";
    }

    function filtrar() {
        const q = document.getElementById('buscador').value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            const match = card.getAttribute('data-search').toLowerCase().includes(q);
            card.style.display = match ? 'block' : 'none';
            if(match && q !== "") toggleAcc(card.closest('.acc-content').previousElementSibling, true);
        });

        document.querySelectorAll('.accordion').forEach(acc => {
            const hasVisible = [...acc.querySelectorAll('.card')].some(c => c.style.display === 'block');
            acc.style.display = hasVisible ? 'block' : 'none';
        });
    }

    generarCatalogo();
</script>
</body>
</html>
