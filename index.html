        :root { --dorado: #c5a059; --amarillo: #f1c40f; --verde: #2ecc71; --negro: #000000; --gris: #111; --blanco: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--negro); color: var(--blanco); overflow-x: hidden; }

        nav { background: rgba(0,0,0,0.95); padding: 20px; text-align: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Cinzel', serif; font-size: 1.6rem; letter-spacing: 5px; color: var(--dorado); font-weight: 700; }

        .main-banner { width: 100%; height: 300px; background: url('FOTOS/banner_principal.jpg') no-repeat center center; background-size: cover; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid var(--dorado); }
        .banner-text { text-align: center; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 5px; border: 1px solid var(--dorado); }
        .banner-text h1 { font-family: 'Cinzel', serif; font-size: 1.8rem; color: var(--dorado); margin-bottom: 5px; }

        .search-box { padding: 20px; text-align: center; background: #080808; }
        #buscador { width: 90%; max-width: 500px; padding: 12px 20px; border-radius: 25px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; }

        .container { width: 95%; max-width: 1200px; margin: auto; padding-bottom: 50px; }
        .section-title { font-family: 'Cinzel', serif; color: var(--dorado); text-align: center; margin: 40px 0 15px; letter-spacing: 3px; text-transform: uppercase; font-size: 1.3rem; border-bottom: 1px solid #222; padding-bottom: 10px; }

        .highlight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .highlight-item { position: relative; height: 150px; border-radius: 10px; overflow: hidden; border: 1px solid var(--dorado); }
        .highlight-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .highlight-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 800; text-transform: uppercase; font-size: 0.9rem; color: var(--blanco); text-shadow: 2px 2px 4px #000; }

        .accordion { margin-bottom: 10px; border: 1px solid #222; border-radius: 10px; background: var(--gris); overflow: hidden; }
        .acc-header { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 0.85rem; letter-spacing: 1.5px; text-transform: uppercase; }
        .acc-content { display: none; padding: 15px; grid-template-columns: 1fr; gap: 15px; background: #050505; }
        @media(min-width: 768px) { .acc-content { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); } }

        /* ESTILO DE LA TARJETA CON ESPACIO DE IMAGEN */
        .card { background: #000; border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #1a1a1a; position: relative; }
        .img-container { width: 100%; height: 220px; background: #fff; border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 10px; }
        .card img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .card h3 { font-size: 0.8rem; margin-bottom: 10px; min-height: 35px; color: var(--blanco); font-weight: 600; text-transform: uppercase; }
        
        .price-box { border-top: 1px solid #222; padding-top: 12px; margin-top: 10px; }
        .p-trans { display: block; font-size: 0.75rem; color: var(--amarillo); margin-bottom: 4px; font-weight: 600; }
        .p-cash { display: block; font-size: 1.2rem; color: var(--verde); font-weight: 700; }
        .p-cash small { display: block; font-size: 0.55rem; color: #888; text-transform: uppercase; }

        .btn-wa { display: block; margin-top: 15px; background: var(--blanco); color: #000; text-decoration: none; padding: 12px; font-size: 0.7rem; font-weight: 800; border-radius: 5px; text-transform: uppercase; }

        .client-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 20px; }
        .client-gallery img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; border: 1px solid #333; }

        footer { padding: 50px 20px; text-align: center; font-size: 0.7rem; color: #444; border-top: 1px solid #111; letter-spacing: 2px; }
    </style>
</head>

        const marcasD = [...new Set(perfumes.filter(p=>p.c==='D').map(p=>p.m))];

            const acc = document.createElement('div');
            acc.className = 'accordion';
            const perfMarca = lista.filter(p => p.m === marca);

                <div class="acc-header" onclick="toggleAcc(this)">${marca} <span>+</span></div>

                        <div class="card" data-name="${p.n} ${p.m}">

                                <span class="p-trans">TRANSF: $${p.l}</span>
                                <span class="p-cash">$${p.e} <small>EFECTIVO</small></span>
                            </div>
                            <a href="https://wa.me/5491163605504?text=Hola! Quiero consultar por ${p.n}" class="btn-wa">CONSULTAR</a>
                        </div>

                </div>`;
            contenedor.appendChild(acc);
        };

        marcasA.forEach(m => crearAcc(m, perfumes, arabesCont));
        marcasD.forEach(m => crearAcc(m, perfumes, disenadorCont));
    }

    function toggleAcc(el) {
        const content = el.nextElementSibling;
        const span = el.querySelector('span');
        content.style.display = (content.style.display === "grid") ? "none" : "grid";
        span.innerText = (content.style.display === "grid") ? "-" : "+";
    }

    function filtrar() {
        const q = document.getElementById('buscador').value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            const visible = card.getAttribute('data-name').toLowerCase().includes(q);
            card.style.display = visible ? 'block' : 'none';
        });
    }
    renderizar();
</script>
</body>
</html>
