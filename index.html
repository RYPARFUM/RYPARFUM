        .menu a { text-decoration: none; color: var(--negro); font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-left: 15px; }

        /* BANNER */
        .hero { 
            height: 65vh; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('TU_BANNER_SPRAY.jpg'); 
            background-size: cover; background-position: center; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center;
        }
        .hero h2 { font-family: 'Cinzel', serif; font-size: 3rem; letter-spacing: 12px; margin: 0; }
        .hero p { letter-spacing: 4px; color: var(--dorado); margin-top: 10px; font-size: 0.8rem; }

        section { padding: 60px 5%; }
        .section-title { text-align: center; font-family: 'Cinzel', serif; font-size: 1.8rem; letter-spacing: 5px; margin-bottom: 40px; text-transform: uppercase; }

        /* BUSCADOR */
        .search-container { text-align: center; margin-bottom: 40px; }
        #buscador { width: 80%; max-width: 400px; padding: 12px; border: none; border-bottom: 2px solid var(--negro); outline: none; font-family: 'Montserrat'; font-size: 1rem; text-align: center; }

        /* ACORDEONES */
        .accordion { border: 1px solid #eee; margin-bottom: 10px; }
        .accordion-header { background: #fff; padding: 20px; cursor: pointer; font-weight: 600; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; display: flex; justify-content: space-between; }
        .accordion-content { display: none; padding: 20px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; background: var(--gris); }

        /* CARDS */
        .card { background: white; padding: 25px; text-align: center; border: 1px solid #eee; display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px; background: #fff; }
        .card h3 { font-size: 0.8rem; letter-spacing: 1px; margin: 10px 0; height: 35px; }
        .card .notas { font-size: 0.65rem; color: #777; margin-bottom: 15px; height: 35px; overflow: hidden; }
        
        .prices { margin-bottom: 20px; padding: 10px; border-top: 1px solid #f0f0f0; }
        .p-trans { display: block; font-size: 0.75rem; color: #888; margin-bottom: 5px; }
        .p-cash { display: block; font-size: 1.15rem; font-weight: 600; color: var(--negro); }
        .p-cash span { display: block; font-size: 0.6rem; color: var(--dorado); font-weight: 700; margin-top: 4px; }

        .btn-wa { background: var(--negro); color: white; padding: 12px; text-decoration: none; font-size: 0.65rem; letter-spacing: 2px; font-weight: 700; transition: 0.3s; }
        .btn-wa:hover { background: var(--dorado); }

        footer { background: var(--negro); color: white; text-align: center; padding: 60px 5%; font-size: 0.7rem; letter-spacing: 2px; }

    function buildCard(p) {

            <div class="card" data-search="${p.n} ${p.m}">

                <div>

                    <p class="notas">${p.nt}</p>
                </div>
                <div class="prices">
                    <span class="p-trans">TRANSFERENCIA: $${p.l}</span>
                    <span class="p-cash">$${p.e} <span>PAGO EN EFECTIVO</span></span>
                </div>
                <a href="https://wa.me/5491163605504?text=Hola! Quiero el perfume: ${p.n}" class="btn-wa">ENCARGAR AHORA</a>
            </div>
        `;
    }

    function render() {
        const top = document.getElementById('top-ventas');
        const arabes = document.getElementById('lista-arabes');
        const dis = document.getElementById('lista-disenador');

        const marcasA = [...new Set(perfumes.filter(p=>p.c==='A').map(p=>p.m))];
        const marcasD = [...new Set(perfumes.filter(p=>p.c==='D').map(p=>p.m))];

        perfumes.filter(p=>p.top).forEach(p=> top.innerHTML += buildCard(p));

        marcasA.forEach(m => {
            const acc = document.createElement('div');
            acc.className = 'accordion';
            acc.innerHTML = `<div class="accordion-header" onclick="toggle(this)">${m} <span>+</span></div><div class="accordion-content"></div>`;
            perfumes.filter(p=>p.m===m).forEach(p=> acc.querySelector('.accordion-content').innerHTML += buildCard(p));
            arabes.appendChild(acc);
        });

        marcasD.forEach(m => {
            const acc = document.createElement('div');
            acc.className = 'accordion';
            acc.innerHTML = `<div class="accordion-header" onclick="toggle(this)">${m} <span>+</span></div><div class="accordion-content"></div>`;
            perfumes.filter(p=>p.m===m).forEach(p=> acc.querySelector('.accordion-content').innerHTML += buildCard(p));
            dis.appendChild(acc);
        });
    }

    function toggle(el) {
        const content = el.nextElementSibling;
        content.style.display = content.style.display === 'grid' ? 'none' : 'grid';
    }

    function filtrar() {
        const val = document.getElementById('buscador').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.getAttribute('data-search').toLowerCase().includes(val) ? 'flex' : 'none';
        });
    }

    render();
